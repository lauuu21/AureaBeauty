<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mila Beauty</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Clash+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
:root {
  --pink-main: #ff4fa3;
  --pink-soft: #ffd6e8;
  --pink-light: #fff0f6;
  --purple: #a259ff;
  --text-dark: #1a1a1a;
  --text-soft: #6b6b6b;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Outfit',sans-serif;
  background:var(--pink-light);
  color:var(--text-dark);
}

h1,h2,h3{
  font-family:'Clash Display',sans-serif;
}

.navbar{
  display:flex;
  justify-content:space-between;
  padding:20px;
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(10px);
  position:sticky;
  top:0;
}

.logo{
  color:var(--pink-main);
  font-weight:600;
  font-size:22px;
}

.hero{
  text-align:center;
  padding:100px 20px;
  background:linear-gradient(135deg,var(--pink-light),var(--pink-soft));
}

.hero h1{
  font-size:60px;
  color:var(--pink-main);
}

.hero p{
  color:var(--text-soft);
  margin:20px auto;
  max-width:500px;
}

.btn{
  background:linear-gradient(135deg,var(--pink-main),var(--purple));
  color:white;
  padding:14px 30px;
  border-radius:40px;
  text-decoration:none;
  display:inline-block;
  margin-top:20px;
  box-shadow:0 10px 30px rgba(255,79,163,0.3);
}

.products{
  padding:60px 20px;
  text-align:center;
}

.product-grid{
  display:flex;
  gap:20px;
  justify-content:center;
  flex-wrap:wrap;
}

.product-card{
  background:white;
  padding:20px;
  border-radius:20px;
  width:250px;
  box-shadow:0 10px 25px rgba(0,0,0,0.05);
  transition:0.3s;
}

.product-card:hover{
  transform:translateY(-10px) scale(1.03);
}

.product-img{
  height:200px;
  background:var(--pink-soft);
  border-radius:15px;
  margin-bottom:15px;
}

footer{
  text-align:center;
  padding:30px;
  color:var(--text-soft);
}
</style>
</head>

<body>

<nav class="navbar">
  <div class="logo">Mila</div>
</nav>

<section class="hero">
  <h1>Mila Beauty</h1>
  <p>Glow moderno, femenino y auténtico.</p>
  <a href="#" class="btn">Comprar por WhatsApp</a>
</section>

<section class="products">
  <h2>Nueva colección</h2>
  <div class="product-grid">
    <div class="product-card">
      <div class="product-img"></div>
      <h3>Producto 1</h3>
      <p>Descripción corta</p>
    </div>
    <div class="product-card">
      <div class="product-img"></div>
      <h3>Producto 2</h3>
      <p>Descripción corta</p>
    </div>
    <div class="product-card">
      <div class="product-img"></div>
      <h3>Producto 3</h3>
      <p>Descripción corta</p>
    </div>
  </div>
</section>

<footer>
  © 2026 Mila Beauty
</footer>

</body>
</html>
